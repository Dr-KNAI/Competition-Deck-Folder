<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dr. KnAI - Market Opportunity</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;
      background:#0a0e27;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;
    }
    .slide-container{
      width:1920px;height:1080px;position:relative;overflow:hidden;
      background:linear-gradient(135deg,#0a0e27 0%,#1a1f3a 100%);
    }

    /* Background effects */
    .bg-glow{position:absolute;border-radius:50%;filter:blur(100px);opacity:.3;animation:float 20s ease-in-out infinite}
    .glow-1{width:800px;height:800px;background:radial-gradient(circle,#667eea,transparent);top:-400px;right:-200px}
    .glow-2{width:600px;height:600px;background:radial-gradient(circle,#f093fb,transparent);bottom:-300px;left:-300px;animation-delay:-10s}
    .glow-3{width:700px;height:700px;background:radial-gradient(circle,#764ba2,transparent);top:50%;left:30%;transform:translate(-50%,-50%);animation-delay:-5s}
    @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(.9)}}
    .grid-overlay{
      position:absolute;inset:0;
      background-image:linear-gradient(rgba(102,126,234,.03) 1px,transparent 1px),
                       linear-gradient(90deg,rgba(102,126,234,.03) 1px,transparent 1px);
      background-size:50px 50px;animation:grid-move 10s linear infinite;
    }
    @keyframes grid-move{0%{transform:translate(0,0)}100%{transform:translate(50px,50px)}}

    /* Logo corner (actual image) */
    .logo-corner{
      position:absolute;top:40px;left:60px;width:60px;height:60px;border:2px solid rgba(102,126,234,.5);
      border-radius:16px;display:flex;align-items:center;justify-content:center;background:rgba(102,126,234,.1);
      backdrop-filter:blur(10px);z-index:10;overflow:hidden;
    }
    .logo-corner img{width:100%;height:100%;object-fit:contain}

    /* Main content */
    .content{padding:120px 80px 80px;height:100%;display:flex;flex-direction:column;position:relative;z-index:5}
    .slide-title{
      font-size:64px;font-weight:800;text-align:center;margin-bottom:60px;
      background:linear-gradient(135deg,#ffffff 0%,#94a3b8 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
      text-transform:uppercase;letter-spacing:3px;position:relative;opacity:0;animation:fadeInDown .8s ease forwards;
    }
    @keyframes fadeInDown{from{opacity:0;transform:translateY(-30px)}to{opacity:1;transform:translateY(0)}}
    .slide-title::after{
      content:'';position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);width:100px;height:4px;
      background:linear-gradient(90deg,transparent,#667eea,transparent);border-radius:2px;
    }

    /* Layout — give the right column more space than the left  */
    .market-container{display:grid;grid-template-columns:1fr 1.2fr;gap:40px;flex:1}

    /* Left: Mega-trends box (kept compact) */
    .mega-trends{
      background:rgba(255,255,255,.03);backdrop-filter:blur(20px);
      border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:36px;position:relative;overflow:hidden;
      opacity:0;animation:slideInLeft .8s ease .2s forwards;
    }
    @keyframes slideInLeft{from{opacity:0;transform:translateX(-40px)}to{opacity:1;transform:translateX(0)}}
    .trends-title{font-size:26px;font-weight:800;color:#cbd5e1;margin-bottom:18px;display:flex;align-items:center;gap:12px}
    .trends-icon{width:44px;height:44px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 10px 25px rgba(102,126,234,.3)}

    /* Bigger convergence visuals */
    .convergence-visual{position:relative;height:540px;margin-top:8px}

    /* Shared circle styling */
    .trend-circle{
      position:absolute;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
      transition:all .35s cubic-bezier(.175,.885,.32,1.275);cursor:pointer;animation:pulse-gentle 3s ease-in-out infinite;
      padding:14px 10px;
    }
    @keyframes pulse-gentle{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
    .trend-circle:hover{transform:scale(1.07);z-index:10}

    /* Larger, market-correspondent sizes (PET TECH largest) */
    .circle-pet{
      width:360px;height:360px;top:20px;left:10px;
      background:linear-gradient(135deg,rgba(102,126,234,.22),rgba(102,126,234,.12));border:2px solid #667eea;
      box-shadow:0 0 70px rgba(102,126,234,.25);
    }
    .circle-ai{
      width:200px;height:200px;top:30px;right:120px;
      background:linear-gradient(135deg,rgba(118,75,162,.22),rgba(118,75,162,.12));border:2px solid #764ba2;
      box-shadow:0 0 60px rgba(118,75,162,.22);
    }
    .circle-data{
      width:260px;height:260px;bottom:30px;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,rgba(240,147,251,.22),rgba(240,147,251,.12));border:2px solid #f093fb;
      box-shadow:0 0 60px rgba(240,147,251,.25);
    }

    /* Intersection glow */
    .intersection-glow{
      position:absolute;width:140px;height:140px;background:radial-gradient(circle,rgba(255,255,255,.1),transparent);
      border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%);animation:glow-pulse 2s ease-in-out infinite;
    }
    @keyframes glow-pulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.25)}}

    /* Bigger circle typography */
    .trend-value{font-size:56px;font-weight:900;line-height:1;margin-bottom:6px}
    .circle-pet .trend-value{background:linear-gradient(135deg,#a3b8ff,#c7d2fe);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .circle-ai  .trend-value{background:linear-gradient(135deg,#c4b5fd,#e5e7eb);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
    .circle-data .trend-value{background:linear-gradient(135deg,#f5b4ff,#e5e7eb);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}

    .trend-label{font-size:18px;color:#c7d2fe;font-weight:700;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
    .trend-cagr {font-size:22px;color:#10b981;font-weight:800}

    /* Right: TAM/SAM/SOM — bigger */
    .market-metrics{display:flex;flex-direction:column;gap:34px}
    .metric-card{
      background:rgba(255,255,255,.03);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.1);
      border-radius:24px;padding:40px;position:relative;overflow:hidden;opacity:0;animation:slideInRight .8s ease forwards;
    }
    .metric-card:nth-child(1){animation-delay:.4s}
    .metric-card:nth-child(2){animation-delay:.6s}
    @keyframes slideInRight{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    .metric-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#667eea,#764ba2,#f093fb)}
    .metric-header{display:flex;align-items:center;gap:16px;margin-bottom:26px}
    .metric-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:0 10px 25px rgba(0,0,0,.3)}
    .modeling-icon{background:linear-gradient(135deg,#667eea,#764ba2)}
    .annotation-icon{background:linear-gradient(135deg,#f093fb,#f5576c)}
    .metric-title{font-size:26px;font-weight:800;color:#e2e8f0}

    /* Bigger bars & labels */
    .market-sizes{display:flex;flex-direction:column;gap:22px}
    .size-row{display:flex;align-items:center;gap:20px}
    .size-label{width:72px;font-size:18px;font-weight:900;color:#8da2be;text-align:right;letter-spacing:.5px}
    .size-bar-container{flex:1;height:56px;background:rgba(255,255,255,.06);border-radius:28px;position:relative;overflow:hidden}
    .size-bar{
      height:100%;border-radius:28px;display:flex;align-items:center;justify-content:flex-end;padding-right:22px;position:relative;
      animation:grow 1.5s ease-out forwards;animation-delay:inherit;
    }
    @keyframes grow{from{width:0}}
    .modeling-tam{width:100%;background:linear-gradient(135deg,#667eea,#764ba2);animation-delay:.7s}
    .modeling-sam{width:65%; background:linear-gradient(135deg,#764ba2,#8b5cf6);animation-delay:.9s}
    .modeling-som{width:15%; background:linear-gradient(135deg,#8b5cf6,#a78bfa);animation-delay:1.1s}
    .annotation-tam{width:80%; background:linear-gradient(135deg,#f093fb,#f5576c);animation-delay:1.3s}
    .annotation-sam{width:50%; background:linear-gradient(135deg,#f5576c,#fb7185);animation-delay:1.5s}
    .annotation-som{width:15%; background:linear-gradient(135deg,#fb7185,#fda4af);animation-delay:1.7s}
    .size-value{font-size:24px;font-weight:900;color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.35)}
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- Background -->
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>
    <div class="bg-glow glow-3"></div>
    <div class="grid-overlay"></div>

    <!-- Logo -->
    <div class="logo-corner">
      <img src="assets/LOGO.png" alt="Dr. KnAI Logo"/>
    </div>

    <div class="content">
      <h2 class="slide-title">Massive Market Opportunity</h2>

      <div class="market-container">
        <!-- Left: Mega Trends Convergence -->
        <div class="mega-trends">
          <div class="trends-title">
            <div class="trends-icon">📈</div>
            Three Converging Mega-Trends
          </div>

          <div class="convergence-visual">
            <div class="intersection-glow"></div>

            <!-- PET TECH — largest -->
            <div class="trend-circle circle-pet">
              <div class="trend-label">PET TECH</div>
              <div class="trend-value">$64B</div>
              <div class="trend-label">by 2037</div>
              <div class="trend-cagr">15.9% CAGR</div>
            </div>

            <!-- AI IN PET — smallest -->
            <div class="trend-circle circle-ai">
              <div class="trend-label">AI IN PET</div>
              <div class="trend-value">$7.5B</div>
              <div class="trend-label">by 2033</div>
              <div class="trend-cagr">15% CAGR</div>
            </div>

            <!-- DATA ANNOTATION — middle -->
            <div class="trend-circle circle-data">
              <div class="trend-label">DATA ANNOTATION</div>
              <div class="trend-value">$17.1B</div>
              <div class="trend-label">by 2030</div>
              <div class="trend-cagr">28% CAGR</div>
            </div>
          </div>
        </div>

        <!-- Right: TAM/SAM/SOM -->
        <div class="market-metrics">
          <!-- Pet Modeling Market -->
          <div class="metric-card">
            <div class="metric-header">
              <div class="metric-icon modeling-icon">🤖</div>
              <div class="metric-title">Pet AI Modeling (2033)</div>
            </div>
            <div class="market-sizes">
              <div class="size-row">
                <div class="size-label">TAM</div>
                <div class="size-bar-container">
                  <div class="size-bar modeling-tam">
                    <span class="size-value">$4.5B</span>
                  </div>
                </div>
              </div>
              <div class="size-row">
                <div class="size-label">SAM</div>
                <div class="size-bar-container">
                  <div class="size-bar modeling-sam">
                    <span class="size-value">$2.9B</span>
                  </div>
                </div>
              </div>
              <div class="size-row">
                <div class="size-label">SOM</div>
                <div class="size-bar-container">
                  <div class="size-bar modeling-som">
                    <span class="size-value">$438M</span>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Annotation Market -->
          <div class="metric-card">
            <div class="metric-header">
              <div class="metric-icon annotation-icon">🏷️</div>
              <div class="metric-title">Pet Data Annotation (2030)</div>
            </div>
            <div class="market-sizes">
              <div class="size-row">
                <div class="size-label">TAM</div>
                <div class="size-bar-container">
                  <div class="size-bar annotation-tam">
                    <span class="size-value">$860M</span>
                  </div>
                </div>
              </div>
              <div class="size-row">
                <div class="size-label">SAM</div>
                <div class="size-bar-container">
                  <div class="size-bar annotation-sam">
                    <span class="size-value">$559M</span>
                  </div>
                </div>
              </div>
              <div class="size-row">
                <div class="size-label">SOM</div>
                <div class="size-bar-container">
                  <div class="size-bar annotation-som">
                    <span class="size-value">$84M</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- end right -->
      </div>
    </div>
  </div>
</body>
</html>
